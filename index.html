<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./assets/styles/mobile/default.css" media="screen and (max-width: 768px)">
    <link rel="stylesheet" href="./assets/styles/mobile/modal.css" media="screen and (max-width: 768px)">
    <link rel="stylesheet" href="./assets/styles/desktop/default.css" media="screen and (min-width: 769px)">
    <link rel="stylesheet" href="./assets/styles/universal.css">
    <link rel="stylesheet" href="./assets/styles/variables.css">
    <title>Select language</title>
</head>
<body>
    <h2>Please select your language.</h2>
    <center>
      <a class="btn" href="https://folltawn.github.io/ru/home/" style="display: inline-block;">🇷🇺 | Russian</a>
      <a class="btn" href="https://folltawn.github.io/en/home/" style="display: inline-block;">🇺🇸 | English</a>
    </center>
    <!-- Кнопка открытия модального окна -->
<button id="themeToggle" class="btn">Сменить тему</button>

<!-- Модальное окно -->
<div id="themeModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Выберите тему</h2>
      <button class="close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="theme-options">
        <label class="theme-option">
          <input type="radio" name="theme" value="default" checked>
          <span class="theme-preview default"></span>
          <span class="theme-name">По умолчанию</span>
        </label>
        
        <label class="theme-option">
          <input type="radio" name="theme" value="night">
          <span class="theme-preview night"></span>
          <span class="theme-name">Темная</span>
        </label>
        
        <label class="theme-option">
          <input type="radio" name="theme" value="light">
          <span class="theme-preview light"></span>
          <span class="theme-name">Светлая</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button id="cancelBtn" class="btn secondary">Отмена</button>
      <button id="saveBtn" class="btn primary">Готово</button>
    </div>
  </div>
</div>
    <script src="./assets/scripts/theme.js"></script>
</body>
</html>
